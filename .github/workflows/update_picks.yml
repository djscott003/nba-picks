name: NBA Picks Daily Update

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM ET
    - cron: '0 17 * * *'   # 12:00 PM ET
    - cron: '0 22 * * *'   # 5:00 PM ET
    - cron: '0 1 * * *'    # 8:00 PM ET
  workflow_dispatch:         # manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run updater
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python update_picks.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "🏀 NBA picks update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
